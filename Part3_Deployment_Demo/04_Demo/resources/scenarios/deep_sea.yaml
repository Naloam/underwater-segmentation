# 深海遗迹场景配置
scene: 深海遗迹
description: 适用于深水环境，低光照，高散射

# 图像增强配置
enhancement:
  method: histogram_equalization
  params:
    clip_limit: 3.0

# 分割配置
segmentation:
  confidence_threshold: 0.6
  target_classes: [3, 7]
  min_region_size: 200

# 性能配置
performance:
  target_fps: 10
  input_size: [256, 256]

# 可视化配置
visualization:
  show_confidence: false
  overlay_alpha: 0.6
